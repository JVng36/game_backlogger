<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Backlog — game tracker</title>
<script>(function(){var t=localStorage.getItem('backlog-theme')||'dark';document.documentElement.dataset.theme=t;})()</script>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="wrap">
  <h2 class="sr-only">Game backlog tracker — data stored locally in your browser</h2>

  <header>
    <div class="brand">
      <div class="mark" aria-hidden="true">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="11" x2="10" y2="11"/><line x1="8" y1="9" x2="8" y2="13"/><line x1="15" y1="12" x2="15.01" y2="12"/><line x1="18" y1="10" x2="18.01" y2="10"/><rect x="2" y="6" width="20" height="12" rx="2"/></svg>
      </div>
      <div>
        <h1>Backlog</h1>
        <p id="summary">0 games</p>
      </div>
    </div>
    <div class="header-actions">
      <div class="theme-toggle" id="themeToggle" role="group" aria-label="Theme">
        <button class="theme-btn" data-t="dark" title="Dark mode" aria-label="Dark mode">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <button class="theme-btn" data-t="light" title="Light mode" aria-label="Light mode">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>

      </div>
      <button class="icon-btn" id="exportBtn" title="Export your list as a file" aria-label="Export list">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </button>
      <button class="icon-btn" id="importBtn" title="Import a list from a file" aria-label="Import list">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      </button>
      <input type="file" id="importFile" accept="application/json,.json" style="display:none" />
      <button class="btn" id="addToggle">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add game
      </button>
    </div>
  </header>

  <div class="buckets" id="buckets"></div>

  <div id="formMount"></div>

  <div class="toolbar">
    <div class="search">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="search" placeholder="Search…" />
    </div>
    <select id="sort">
      <option value="added">Recent</option>
      <option value="alpha">A–Z</option>
      <option value="hours">By hours</option>
    </select>
  </div>

  <div id="list" class="list"></div>
</div>

<div class="toast" id="toast"></div>

<script src="constants.js"></script>
<script src="state.js"></script>
<script src="render.js"></script>
<script src="export-import.js"></script>
<script src="main.js"></script>
</body>
</html>
